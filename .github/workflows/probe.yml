name: GTA VI URL Probe

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Probe for new pages
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          TIME=$(date -u '+%d %b %Y at %H:%M UTC')

          HOME_SIZE=$(curl -sL --max-time 15 -o /dev/null -w "%{size_download}" "https://www.rockstargames.com/VI/")
          OIL_SIZE=$(curl -sL --max-time 15 -o /dev/null -w "%{size_download}" "https://www.rockstargames.com/VI/only-in-leonida")
          echo "Catch-all sizes: homepage=${HOME_SIZE} only-in-leonida=${OIL_SIZE}"

          KNOWN="probe-known.txt"
          if [ ! -f "$KNOWN" ]; then
            printf 'only-in-leonida\nmedia\neditions\njason\nlucia\nambrosia\nboobie\nbrian\ncal\ndrequan\nraul\ndimez\nvice-city\nport-gellhorn\nleonida-keys\ngrassrivers\nkalaga\ndownloads\n' > "$KNOWN"
          fi

          PATHS=(
            story gameplay features world map characters factions
            weapons vehicles radio music soundtrack
            online gta-online multiplayer
            buy pre-order collector special-edition day-one ultimate-edition standard-edition
            pc requirements accessibility
            news newswire support faq
            heist score prologue epilogue credits
            gta-plus interactive
            trailer trailers videos screenshots artwork wallpapers
            gameplay-trailer making-of behind-the-scenes
            leonida kelly-county
            launch release
          )

          NEW_PAGES=""

          for path in "${PATHS[@]}"; do
            grep -q "^${path}$" "$KNOWN" && continue

            RESULT=$(curl -sL --max-time 10 -o /dev/null -w "%{http_code} %{size_download}" "https://www.rockstargames.com/VI/$path")
            STATUS=$(echo "$RESULT" | awk '{print $1}')
            BYTES=$(echo "$RESULT" | awk '{print $2}')

            if [ "$STATUS" = "200" ]; then
              HOME_DIFF=$(( HOME_SIZE - BYTES )); [ $HOME_DIFF -lt 0 ] && HOME_DIFF=$(( -HOME_DIFF ))
              OIL_DIFF=$(( OIL_SIZE - BYTES ));  [ $OIL_DIFF -lt 0 ] && OIL_DIFF=$(( -OIL_DIFF ))

              if [ "$HOME_DIFF" -gt 10000 ] && [ "$OIL_DIFF" -gt 10000 ]; then
                NEW_PAGES="${NEW_PAGES}• /VI/${path} (${BYTES} bytes)\n"
                echo "$path" >> "$KNOWN"
              fi
            fi
          done

          # Discord alert only when new pages found
          if [ -n "$NEW_PAGES" ]; then
            MSG="🗺️ **New GTA VI page(s) live!** | ${TIME}\n\n$(printf "$NEW_PAGES")\nhttps://www.rockstargames.com/VI/"
            curl -s -X POST "$DISCORD_WEBHOOK" \
              -H "Content-Type: application/json" \
              -d "$(jq -n --arg content "$MSG" '{content: $content}')"
          else
            echo "No new pages found."
          fi

          # Always commit probe-known.txt — creates it on first run, updates on discovery
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash origin main
          git add "$KNOWN"
          if git diff --cached --quiet; then
            echo "Nothing to commit."
          else
            COMMIT_MSG=$([ -n "$NEW_PAGES" ] && echo "New VI pages detected" || echo "Initialise probe-known.txt")
            git commit -m "$COMMIT_MSG"
            git push
          fi
