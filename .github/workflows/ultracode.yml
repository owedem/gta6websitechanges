name: GTA Bot Ultracode

# Forensic deep-diff of every GTA VI surface, with a plain-English AI analysis
# layer. Runs independently of monitor.yml / scan.yml / probe.yml — different
# schedule, different state files, its own Discord webhook — so it cannot
# interfere with them and can be A/B compared against them.

on:
  schedule:
    # :05 and :35 — offset from the others (which run at :00/:10/:20/:40) to
    # avoid git push races on main.
    - cron: '5,35 * * * *'
  workflow_dispatch:
    inputs:
      selftest:
        description: "Post a synthetic test alert (verifies webhook + AI key)"
        type: boolean
        default: false

jobs:
  ultracode:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install --quiet anthropic

      - name: Run Ultracode
        env:
          # --- AI analysis layer (optional; the workflow still detects, diffs,
          # commits, and posts a non-AI summary without any key) ---
          # FREE option (preferred when set): Google Gemini. Get a no-cost key
          # at https://aistudio.google.com/apikey — no credit card needed.
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: gemini-2.0-flash
          # PAID option: Anthropic Claude. Only used if GEMINI_API_KEY is unset.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANALYSIS_MODEL: claude-opus-4-8
          # Dedicated webhook (its own Discord channel) — no fallback, so this
          # workflow stays cleanly separate for A/B comparison with the others.
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_ULTRACODE }}
          # Set by the "Run workflow" selftest checkbox; empty on scheduled runs.
          SELFTEST: ${{ inputs.selftest }}
        run: python .github/scripts/ultracode.py

      - name: Commit snapshot state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash origin main
          git add ultracode-state 2>/dev/null || true
          [ -f ultracode-log.md ] && git add ultracode-log.md
          if git diff --cached --quiet; then
            echo "No snapshot changes to commit."
          else
            git commit -m "Ultracode: snapshot state updated"
            git push
          fi
