name: GTA Bot Ultracode

# Forensic deep-diff of every GTA VI surface, with a plain-English AI analysis
# layer. Runs independently of monitor.yml / scan.yml / probe.yml — different
# schedule, different state files, its own Discord webhook — so it cannot
# interfere with them and can be A/B compared against them.

on:
  # Triggered every 5 min by an external cron-job.org pinger (which calls the
  # workflow_dispatch REST API) — reliable, unlike GitHub's best-effort native
  # cron, which is intentionally NOT used here. Also runnable manually.
  workflow_dispatch:
    inputs:
      full_scan:
        description: "Force a full scan now (code scan + URL probe), ignoring their cadence timers"
        type: boolean
        default: false

jobs:
  ultracode:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install --quiet anthropic

      - name: Run Ultracode
        env:
          # --- AI analysis layer (optional; the workflow still detects, diffs,
          # commits, and posts a non-AI summary without any key) ---
          # FREE option (preferred): Groq — generous free tier, no card, works
          # everywhere. Key: https://console.groq.com/keys
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL: llama-3.3-70b-versatile
          # FREE option: Google Gemini (low/regional free limits). Key:
          # https://aistudio.google.com/apikey
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: gemini-2.0-flash
          # PAID option: Anthropic Claude. Only used if no GROQ_API_KEY/GEMINI_API_KEY.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANALYSIS_MODEL: claude-opus-4-8
          # Dedicated webhook (its own Discord channel) — no fallback, so this
          # workflow stays cleanly separate for A/B comparison with the others.
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_ULTRACODE }}
          # Dedicated channels for posting the actual new media (optional; if
          # unset, media just gets named in the main alert as before).
          DISCORD_WEBHOOK_IMAGES: ${{ secrets.DISCORD_WEBHOOK_IMAGES }}
          DISCORD_WEBHOOK_VIDEOS: ${{ secrets.DISCORD_WEBHOOK_VIDEOS }}
          # true only when a human ticks "Force a full scan"; empty on cron and
          # on external workflow_dispatch pings (those do a normal gated run).
          FULL_SCAN: ${{ inputs.full_scan }}
        run: python .github/scripts/ultracode.py

      - name: Commit snapshot state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ultracode-state 2>/dev/null || true
          [ -f ultracode-log.md ] && git add ultracode-log.md
          if git diff --cached --quiet; then
            echo "No snapshot changes to commit."
          else
            git commit -m "Ultracode: snapshot state updated"
            # Retry against concurrent pushes from the other workflows so the
            # snapshot is never lost — a lost snapshot would re-trigger the same
            # alert on the next run (duplicate Discord message).
            pushed=false
            for i in 1 2 3 4 5; do
              git pull --rebase --autostash origin main && git push && { pushed=true; break; }
              echo "push attempt $i failed (likely a concurrent push); retrying..."
              sleep 5
            done
            [ "$pushed" = true ] || echo "::warning::could not push snapshot after retries"
          fi
