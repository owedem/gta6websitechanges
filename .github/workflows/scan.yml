name: GTA VI Deep Scan

on:
  schedule:
    - cron: '*/20 * * * *'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Scan chunks and notify only on changes
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          curl -sL https://www.rockstargames.com/VI/ > /tmp/page.html
          mkdir -p /tmp/chunks
          grep -oP '_next/static/chunks/[^"]+\.js' /tmp/page.html | sort -u | head -30 | while read chunk; do
            FNAME=$(basename "$chunk")
            curl -sL "https://www.rockstargames.com/VI/${chunk}" > "/tmp/chunks/${FNAME}"
          done

          echo 'HIDDEN ROUTES:' > /tmp/new.txt
          grep -rhoP '"/VI/[a-zA-Z0-9_\-/]+"' /tmp/chunks/ | sort -u | grep -v "_next" >> /tmp/new.txt || echo "none" >> /tmp/new.txt
          echo '' >> /tmp/new.txt
          echo 'DATES:' >> /tmp/new.txt
          grep -rhoP '.{20}202[456789].{20}' /tmp/chunks/ | sort -u | head -20 >> /tmp/new.txt || echo 'none' >> /tmp/new.txt
          echo '' >> /tmp/new.txt
          echo 'KEYWORDS:' >> /tmp/new.txt
          grep -rniP 'preorder|unlock|launch' /tmp/chunks/ | grep -ivP "pointerCapture|releaseProxy|releaseLock|onRelease|releasePointer|unlockAudioContext|launchpad|launcher" | while IFS=: read file match; do
            FNAME=$(basename "$file")
            CONTEXT=$(echo "$match" | grep -oP '.{0,60}(preorder|unlock|launch).{0,60}')
            echo "[$FNAME] $CONTEXT"
          done | sort -u | head -20 >> /tmp/new.txt || echo "none" >> /tmp/new.txt
          echo '' >> /tmp/new.txt
          echo 'API ENDPOINTS:' >> /tmp/new.txt
          grep -rhoP 'https?://[^"\x27\s]+rockstar[^"\x27\s]+' /tmp/chunks/ | sort -u >> /tmp/new.txt || echo "none" >> /tmp/new.txt

          PREV=scan-findings.txt
          if [ -f "$PREV" ] && diff -q "$PREV" /tmp/new.txt > /dev/null 2>&1; then
            echo "No changes. Skipping Discord."
            exit 0
          fi

          if [ -f "$PREV" ]; then
            NEWLINES=$(diff "$PREV" /tmp/new.txt | grep '^>' | sed 's/^> //' | grep -v '^$')
          else
            NEWLINES=$(cat /tmp/new.txt)
          fi

          TIME=$(date -u '+%Y-%m-%d %H:%M UTC')

          {
            echo "**GTA VI Site - New Findings ($TIME)**"
            echo ""

            ROUTES=$(echo "$NEWLINES" | grep -oP '"/VI/[^"]+' | sed 's|"/VI/||')
            if [ -n "$ROUTES" ]; then
              echo "**New Hidden Pages** (pages that exist in the code but arent publicly linked):"
              echo "$ROUTES" | sed 's|^|  - rockstargames.com/VI/|'
              echo ""
            fi

            DATES=$(echo "$NEWLINES" | grep -oP '.{0,20}202[456789].{0,20}')
            if [ -n "$DATES" ]; then
              echo "**Dates Found in Code** (possible release dates or event windows):"
              echo "$DATES" | sed 's/^/  - /'
              echo ""
            fi

            KEYWORDS=$(echo "$NEWLINES" | grep -iP '^\[' | grep -iP 'preorder|unlock|launch')
            if [ -n "$KEYWORDS" ]; then
              echo "**Preorder / Launch Keywords** (found in JS file - shows file name and surrounding code):"
              echo "$KEYWORDS" | sed 's/^/  - /'
              echo ""
            fi

            APIS=$(echo "$NEWLINES" | grep -oP 'https?://[^\s]+')
            if [ -n "$APIS" ]; then
              echo "**Backend URLs** (servers the site talks to behind the scenes):"
              echo "$APIS" | sed 's/^/  - /'
            fi
          } > /tmp/msg.txt

          TOTAL=$(wc -c < /tmp/msg.txt)
          START=0
          PART=1
          while [ $START -lt $TOTAL ]; do
            dd if=/tmp/msg.txt bs=1 skip=$START count=1900 2>/dev/null > /tmp/chunk.txt
            START=$((START + 1900))
            jq -n --rawfile text /tmp/chunk.txt '{content: $text}' > /tmp/payload.json
            curl -s -H "Content-Type: application/json" -d @/tmp/payload.json "$DISCORD_WEBHOOK"
            PART=$((PART + 1))
            sleep 1
          done

          cp /tmp/new.txt scan-findings.txt
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scan-findings.txt
          git commit -m "Scan findings updated"
          git push
