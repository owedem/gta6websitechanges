name: GTA VI Deep Scan

on:
  schedule:
    - cron: '*/20 * * * *'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Scan chunks and notify only on changes
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          curl -sL https://www.rockstargames.com/VI/ > /tmp/page.html
          mkdir -p /tmp/chunks
          grep -oP '_next/static/chunks/[^"]+\.js' /tmp/page.html | sort -u | head -30 | while read chunk; do
            FNAME=$(basename "$chunk")
            curl -sL "https://www.rockstargames.com/VI/${chunk}" > "/tmp/chunks/${FNAME}"
          done

          echo 'HIDDEN ROUTES:' > /tmp/new.txt
          grep -rhoP '"/VI/[a-zA-Z0-9_\-/]+"' /tmp/chunks/ 2>/dev/null | sort -u | grep -v "_next" >> /tmp/new.txt || echo "none" >> /tmp/new.txt
          echo '' >> /tmp/new.txt
          echo 'DATES:' >> /tmp/new.txt
          grep -rhoP '202[456789]-\d{2}-\d{2}' /tmp/chunks/ 2>/dev/null | sort -u >> /tmp/new.txt || true
          grep -rhoP '202[456789]/\d{2}/\d{2}' /tmp/chunks/ 2>/dev/null | sort -u >> /tmp/new.txt || true
          grep -rhoP '(Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)[a-z]* 202[456789]' /tmp/chunks/ 2>/dev/null | sort -u >> /tmp/new.txt || true
          grep -rhoP '\d{1,2} (Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)[a-z]* 202[456789]' /tmp/chunks/ 2>/dev/null | sort -u >> /tmp/new.txt || true
          grep -c "" /tmp/new.txt | grep -q "^[23]$" && echo "none" >> /tmp/new.txt || true
          echo '' >> /tmp/new.txt
          echo 'KEYWORDS:' >> /tmp/new.txt
          grep -rhoP '.{0,50}(preorder|pre-order|pre_order).{0,50}' /tmp/chunks/ 2>/dev/null | grep -ivP "pointerCapture|releaseProxy|releaseLock|onRelease|releasePointer|unlockAudioContext|launchpad|launcher" | sort -u | head -20 >> /tmp/new.txt || echo "none" >> /tmp/new.txt
          echo '' >> /tmp/new.txt
          echo 'API ENDPOINTS:' >> /tmp/new.txt
          grep -rhoP 'https?://[^"\x27\s]+rockstar[^"\x27\s]+/VI/[^"\x27\s]*' /tmp/chunks/ 2>/dev/null | sort -u >> /tmp/new.txt || echo "none" >> /tmp/new.txt

          PREV=deep-scan-findings.txt
          if [ -f "$PREV" ] && diff -q "$PREV" /tmp/new.txt > /dev/null 2>&1; then
            echo "No changes. Skipping Discord."
            exit 0
          fi

          if [ -f "$PREV" ]; then
            NEWLINES=$(diff "$PREV" /tmp/new.txt | grep '^>' | sed 's/^> //' | grep -vP '^(HIDDEN ROUTES:|DATES:|KEYWORDS:|API ENDPOINTS:|)$') || true
          else
            NEWLINES=$(grep -vP '^(HIDDEN ROUTES:|DATES:|KEYWORDS:|API ENDPOINTS:|)$' /tmp/new.txt) || true
          fi

          if [ -z "$NEWLINES" ]; then
            echo "Only structural changes, no new content. Skipping Discord."
            cp /tmp/new.txt deep-scan-findings.txt
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git pull --rebase --autostash origin main
            git add deep-scan-findings.txt
            git commit -m "Deep scan findings updated" && git push || true
            exit 0
          fi

          TIME=$(date -u '+%Y-%m-%d %H:%M UTC')
          {
            echo "**GTA VI Site - New Findings ($TIME)**"
            echo ""
            ROUTES=$(echo "$NEWLINES" | grep -oP '"/VI/[^"]+' | sed 's|"/VI/||') || true
            if [ -n "$ROUTES" ]; then
              echo "**New Hidden Pages** (pages in the code not publicly linked):"
              echo "$ROUTES" | sed 's|^|  - rockstargames.com/VI/|'
              echo ""
            fi
            DATES=$(echo "$NEWLINES" | grep -P '202[456789]') || true
            if [ -n "$DATES" ]; then
              echo "**Dates Found in Code** (possible release dates or event windows):"
              echo "$DATES" | sed 's/^/  - /'
              echo ""
            fi
            KEYWORDS=$(echo "$NEWLINES" | grep -iP 'preorder|pre-order') || true
            if [ -n "$KEYWORDS" ]; then
              echo "**Preorder Keywords Found** (in site JS code):"
              echo "$KEYWORDS" | sed 's/^/  - /'
              echo ""
            fi
            APIS=$(echo "$NEWLINES" | grep -oP 'https?://[^\s]+') || true
            if [ -n "$APIS" ]; then
              echo "**New Backend URLs:**"
              echo "$APIS" | sed 's/^/  - /'
              echo ""
            fi
            if [ -z "$ROUTES" ] && [ -z "$DATES" ] && [ -z "$KEYWORDS" ] && [ -z "$APIS" ]; then
              echo "**Raw changes detected:**"
              echo "$NEWLINES" | head -30 | sed 's/^/  /'
            fi
          } > /tmp/msg.txt

          TOTAL=$(wc -c < /tmp/msg.txt)
          START=0
          PART=1
          while [ $START -lt $TOTAL ]; do
            dd if=/tmp/msg.txt bs=1 skip=$START count=1900 2>/dev/null > /tmp/chunk.txt
            START=$((START + 1900))
            jq -n --rawfile text /tmp/chunk.txt '{content: $text}' > /tmp/payload.json
            curl -s -H "Content-Type: application/json" -d @/tmp/payload.json "$DISCORD_WEBHOOK"
            PART=$((PART + 1))
            sleep 1
          done

          cp /tmp/new.txt deep-scan-findings.txt
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash origin main
          git add deep-scan-findings.txt
          git commit -m "Deep scan findings updated"
          git push
