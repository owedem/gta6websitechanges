name: GTA VI Deep Scan

on:
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Scan chunks and save findings
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          curl -sL https://www.rockstargames.com/VI/ > /tmp/page.html
          grep -oP '_next/static/chunks/[^"]+\.js' /tmp/page.html | sort -u | head -30 | while read chunk; do
            curl -sL "https://www.rockstargames.com/VI/${chunk}" >> /tmp/allchunks.js
          done

          TIME=$(date -u '+%Y-%m-%d %H:%M UTC')
          echo "GTA VI Site Scan - $TIME" > scan-findings.txt
          echo "==============================" >> scan-findings.txt
          echo "" >> scan-findings.txt
          echo "=== HIDDEN ROUTES ===" >> scan-findings.txt
          grep -oP '"/VI/[a-zA-Z0-9_\-/]+"' /tmp/allchunks.js | sort -u | grep -v "_next" >> scan-findings.txt || echo "none found" >> scan-findings.txt
          echo "" >> scan-findings.txt
          echo "=== DATES ===" >> scan-findings.txt
          grep -oP '.{20}(202[456789]).{20}' /tmp/allchunks.js | sort -u | head -20 >> scan-findings.txt || echo "none found" >> scan-findings.txt
          echo "" >> scan-findings.txt
          echo "=== PREORDER/UNLOCK/LAUNCH ===" >> scan-findings.txt
          grep -oiP '.{0,40}(preorder|unlock|launch|release).{0,40}' /tmp/allchunks.js | grep -iv "pointerCapture\|releaseProxy\|releaseLock\|onRelease\|RELEASE.*pointer\|releasePointer" | sort -u | head -20 >> scan-findings.txt || echo "none found" >> scan-findings.txt
          echo "" >> scan-findings.txt
          echo "=== API ENDPOINTS ===" >> scan-findings.txt
          grep -oP 'https?://[^"\x27\s]+rockstar[^"\x27\s]+' /tmp/allchunks.js | sort -u >> scan-findings.txt || echo "none found" >> scan-findings.txt
          echo "" >> scan-findings.txt
          echo "=== FEATURE FLAGS ===" >> scan-findings.txt
          grep -oiP '.{0,30}(featureFlag|isEnabled|isDisabled).{0,30}' /tmp/allchunks.js | sort -u | head -20 >> scan-findings.txt || echo "none found" >> scan-findings.txt

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scan-findings.txt
          git commit -m "Scan results: $TIME"
          git push

          RUN_URL="https://github.com/owedem/gta6websitechanges/blob/main/scan-findings.txt"
          PAYLOAD=$(jq -n --arg url "$RUN_URL" --arg time "$TIME" '{content: ("**GTA VI Deep Scan complete!** " + $time + " - Results: " + $url)}')
          curl -s -H "Content-Type: application/json" -d "$PAYLOAD" "$DISCORD_WEBHOOK"
