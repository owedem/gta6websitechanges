name: GTA VI Deep Scan

on:
  schedule:
    - cron: '*/20 * * * *'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Scan chunks and send to Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          curl -sL https://www.rockstargames.com/VI/ > /tmp/page.html
          grep -oP '_next/static/chunks/[^"]+\.js' /tmp/page.html | sort -u | head -30 | while read chunk; do
            curl -sL "https://www.rockstargames.com/VI/${chunk}" >> /tmp/allchunks.js
          done

          TIME=$(date -u '+%Y-%m-%d %H:%M UTC')
          echo "GTA VI Site Scan - $TIME" > /tmp/findings.txt
          echo "==============================" >> /tmp/findings.txt
          echo "" >> /tmp/findings.txt
          echo "HIDDEN ROUTES:" >> /tmp/findings.txt
          grep -oP '"/VI/[a-zA-Z0-9_\-/]+"' /tmp/allchunks.js | sort -u | grep -v "_next" >> /tmp/findings.txt || echo "none" >> /tmp/findings.txt
          echo "" >> /tmp/findings.txt
          echo "DATES:" >> /tmp/findings.txt
          grep -oP '.{20}(202[456789]).{20}' /tmp/allchunks.js | sort -u | head -20 >> /tmp/findings.txt || echo "none" >> /tmp/findings.txt
          echo "" >> /tmp/findings.txt
          echo "PREORDER/UNLOCK/LAUNCH:" >> /tmp/findings.txt
          grep -oiP '.{0,40}(preorder|unlock|launch).{0,40}' /tmp/allchunks.js | grep -iv "pointerCapture|releaseProxy|releaseLock|onRelease|releasePointer" | sort -u | head -20 >> /tmp/findings.txt || echo "none" >> /tmp/findings.txt
          echo "" >> /tmp/findings.txt
          echo "API ENDPOINTS:" >> /tmp/findings.txt
          grep -oP 'https?://[^"\x27\s]+rockstar[^"\x27\s]+' /tmp/allchunks.js | sort -u >> /tmp/findings.txt || echo "none" >> /tmp/findings.txt

          TOTAL=$(wc -c < /tmp/findings.txt)
          START=0
          PART=1
          while [ $START -lt $TOTAL ]; do
            dd if=/tmp/findings.txt bs=1 skip=$START count=1900 2>/dev/null > /tmp/chunk.txt
            START=$((START + 1900))
            printf "**GTA VI Deep Scan - Part %s:**\n" "$PART" > /tmp/msg.txt
            cat /tmp/chunk.txt >> /tmp/msg.txt
            jq -n --rawfile text /tmp/msg.txt '{content: $text}' > /tmp/payload.json
            curl -s -H "Content-Type: application/json" -d @/tmp/payload.json "$DISCORD_WEBHOOK"
            PART=$((PART + 1))
            sleep 1
          done
