name: GTA VI Site Monitor

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
      - name: Track media counts
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          curl -sL --max-time 15 "https://www.rockstargames.com/VI/media" > /tmp/media_page.html

          python3 << 'PYEOF' > /tmp/new_counts.txt
          import re
          html = open('/tmp/media_page.html').read()
          for label in ['Videos', 'Screenshots', 'Artwork']:
              m = re.search(label + r'.*?aria-hidden=["\']true["\']>(\d+)', html, re.DOTALL)
              print(label.lower() + '=' + (m.group(1) if m else '0'))
          PYEOF

          echo "Counts found:"; cat /tmp/new_counts.txt

          COUNTS_FILE="monitor-media-counts.txt"
          touch "$COUNTS_FILE"

          OLD_VIDEOS=$(grep -oP '(?<=videos=)\d+' "$COUNTS_FILE" || echo "0")
          OLD_SCREENSHOTS=$(grep -oP '(?<=screenshots=)\d+' "$COUNTS_FILE" || echo "0")
          OLD_ARTWORK=$(grep -oP '(?<=artwork=)\d+' "$COUNTS_FILE" || echo "0")
          NEW_VIDEOS=$(grep -oP '(?<=videos=)\d+' /tmp/new_counts.txt || echo "0")
          NEW_SCREENSHOTS=$(grep -oP '(?<=screenshots=)\d+' /tmp/new_counts.txt || echo "0")
          NEW_ARTWORK=$(grep -oP '(?<=artwork=)\d+' /tmp/new_counts.txt || echo "0")

          CHANGES=""
          [ "$NEW_VIDEOS" -gt "$OLD_VIDEOS" ] 2>/dev/null && \
            CHANGES="${CHANGES}📹 Videos: ${OLD_VIDEOS} → ${NEW_VIDEOS}\n"
          [ "$NEW_SCREENSHOTS" -gt "$OLD_SCREENSHOTS" ] 2>/dev/null && \
            CHANGES="${CHANGES}📸 Screenshots: ${OLD_SCREENSHOTS} → ${NEW_SCREENSHOTS}\n"
          [ "$NEW_ARTWORK" -gt "$OLD_ARTWORK" ] 2>/dev/null && \
            CHANGES="${CHANGES}🎨 Artwork: ${OLD_ARTWORK} → ${NEW_ARTWORK}\n"

          if [ -n "$CHANGES" ]; then
            TIME=$(date -u '+%d %b %Y at %H:%M UTC')
            MSG="📺 **GTA VI media page updated** | ${TIME}\n\n${CHANGES}\nhttps://www.rockstargames.com/VI/media"
            curl -s -X POST "$DISCORD_WEBHOOK" \
              -H "Content-Type: application/json" \
              -d "$(jq -n --arg content "$MSG" '{content: $content}')"
          else
            echo "No media count changes."
          fi

          cp /tmp/new_counts.txt "$COUNTS_FILE"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash origin main
          git add "$COUNTS_FILE"
          git diff --cached --quiet || git commit -m "Media counts updated" && git push || true
      - name: Fetch current ETag
        id: fetch
        run: |
          ETAG=$(curl -sIL https://www.rockstargames.com/VI/ | grep -i "^etag:" | tail -1 | tr -d '\r' | awk '{print $2}')
          echo "etag=$ETAG" >> $GITHUB_OUTPUT
          echo "Current ETag: $ETAG"

      - name: Read stored ETag
        id: stored
        run: |
          STORED=$(cat etag.txt 2>/dev/null || echo "none")
          echo "etag=$STORED" >> $GITHUB_OUTPUT
          echo "Stored ETag: $STORED"

      - name: Analyse and notify
        if: steps.fetch.outputs.etag != steps.stored.outputs.etag && steps.fetch.outputs.etag != ''
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          NEW_ETAG: ${{ steps.fetch.outputs.etag }}
        run: |
          curl -sL https://www.rockstargames.com/VI/ > /tmp/page.html
          TIME=$(date -u '+%d %b %Y at %H:%M UTC')

          # Images: strip hash (everything from first dot) to get stable base names
          # e.g. poster_full.02ig6s_80ei58.jpg -> poster_full
          # Prevents false positives when Rockstar rebuilds and all hashes rotate
          grep -oP '/_next/static/media/\K[^"?]+\.(jpg|png|svg|webp)' /tmp/page.html \
            | sed 's/\..*//' | sort -u > /tmp/curr_images.txt

          # JS chunks: track count and names separately from turbopack
          grep -oP '/_next/static/chunks/\K(?!turbopack)[^"]+\.js' /tmp/page.html \
            | sort -u > /tmp/curr_chunks.txt
          TURBOPACK_NEW=$(grep -oP '/_next/static/chunks/\Kturbopack[^"]+\.js' /tmp/page.html | head -1)
          TURBOPACK_OLD=$(cat monitor-turbopack.txt 2>/dev/null || echo "none")

          # Nav routes
          grep -oP 'href="/VI/\K[^"]+' /tmp/page.html | grep -v '_next' \
            | sort -u > /tmp/curr_routes.txt

          # Key visible text: release dates, CTAs
          grep -oP '(Coming [A-Z][a-z]|Available Now|Pre-order|Buy Now|November [0-9]|June [0-9])[^"<]{0,60}' /tmp/page.html \
            | sort -u | head -10 > /tmp/curr_text.txt

          # Diff everything
          NEW_IMAGES=$(diff   monitor-images.txt /tmp/curr_images.txt 2>/dev/null | grep '^>' | sed 's/^> //' || true)
          REM_IMAGES=$(diff   monitor-images.txt /tmp/curr_images.txt 2>/dev/null | grep '^<' | sed 's/^< //' || true)
          NEW_CHUNKS=$(diff   monitor-chunks.txt /tmp/curr_chunks.txt 2>/dev/null | grep '^>' | sed 's/^> //' || true)
          REM_CHUNKS=$(diff   monitor-chunks.txt /tmp/curr_chunks.txt 2>/dev/null | grep '^<' | sed 's/^< //' || true)
          NEW_ROUTES=$(diff   monitor-routes.txt /tmp/curr_routes.txt 2>/dev/null | grep '^>' | sed 's/^> //' || true)
          REM_ROUTES=$(diff   monitor-routes.txt /tmp/curr_routes.txt 2>/dev/null | grep '^<' | sed 's/^< //' || true)
          TEXT_CHANGES=$(diff monitor-text.txt   /tmp/curr_text.txt   2>/dev/null | grep '^>' | sed 's/^> //' || true)

          OLD_COUNT=$(wc -l < monitor-chunks.txt 2>/dev/null | tr -d ' ' || echo 0)
          NEW_COUNT=$(wc -l < /tmp/curr_chunks.txt | tr -d ' ')
          CHUNK_DELTA=$((NEW_COUNT - OLD_COUNT))
          ADDED_C=$(printf '%s' "$NEW_CHUNKS" | grep -c . || echo 0)
          REMOVED_C=$(printf '%s' "$REM_CHUNKS" | grep -c . || echo 0)

          # Determine change type
          IS_CONTENT=false
          [ -n "$NEW_IMAGES" ]     && IS_CONTENT=true
          [ -n "$REM_IMAGES" ]     && IS_CONTENT=true
          [ -n "$NEW_ROUTES" ]     && IS_CONTENT=true
          [ -n "$REM_ROUTES" ]     && IS_CONTENT=true
          [ -n "$TEXT_CHANGES" ]   && IS_CONTENT=true
          [ "$CHUNK_DELTA" -gt 0 ] && IS_CONTENT=true

          # Build Discord message
          if [ "$IS_CONTENT" = true ]; then
            MSG="🚨 **GTA VI site updated — content change detected**"
          else
            MSG="🔄 **GTA VI site updated — backend/rebuild only**"
          fi
          MSG="$MSG | $TIME\n\n"

          if [ -n "$NEW_ROUTES" ]; then
            MSG="${MSG}🗺️ **New nav links:**\n$(echo "$NEW_ROUTES" | sed 's|^|• /VI/|')\n\n"
          fi
          if [ -n "$REM_ROUTES" ]; then
            MSG="${MSG}🗺️ **Removed nav links:**\n$(echo "$REM_ROUTES" | sed 's|^|• /VI/|')\n\n"
          fi

          if [ -n "$TEXT_CHANGES" ]; then
            MSG="${MSG}📝 **Page text changed** (date, CTAs):\n$(echo "$TEXT_CHANGES" | sed 's/^/• /' | head -5)\n\n"
          fi

          if [ -n "$NEW_IMAGES" ]; then
            COUNT=$(echo "$NEW_IMAGES" | wc -l | tr -d ' ')
            MSG="${MSG}🖼️ **${COUNT} new image(s):**\n$(echo "$NEW_IMAGES" | sed 's/^/• /' | head -15)\n\n"
          fi
          if [ -n "$REM_IMAGES" ]; then
            COUNT=$(echo "$REM_IMAGES" | wc -l | tr -d ' ')
            MSG="${MSG}🗑️ **${COUNT} removed image(s):**\n$(echo "$REM_IMAGES" | sed 's/^/• /' | head -10)\n\n"
          fi

          if [ "$CHUNK_DELTA" -gt 0 ]; then
            MSG="${MSG}⚙️ **+${CHUNK_DELTA} net JS chunk(s)** (${ADDED_C} added / ${REMOVED_C} removed) — new code or pages likely staged\n"
          elif [ "$CHUNK_DELTA" -lt 0 ]; then
            CHUNK_DELTA_ABS=$(echo $CHUNK_DELTA | tr -d '-')
            MSG="${MSG}⚙️ **-${CHUNK_DELTA_ABS} net JS chunk(s)** (${ADDED_C} added / ${REMOVED_C} removed) — code removed or consolidated\n"
          elif [ "$ADDED_C" -gt 0 ] || [ "$TURBOPACK_NEW" != "$TURBOPACK_OLD" ]; then
            MSG="${MSG}⚙️ **JS bundle rebuilt** — ${ADDED_C} chunk(s) swapped, net change: 0. Likely a hotfix or dependency update.\n"
          else
            MSG="${MSG}⚙️ **No JS changes** — ETag may reflect a CDN or server-side config change.\n"
          fi

          MSG="${MSG}\nhttps://www.rockstargames.com/VI/"

          TRIMMED=$(printf '%s' "$(printf "$MSG")" | head -c 1950)
          curl -s -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg content "$TRIMMED" '{content: $content}')"

          # Save new state
          cp /tmp/curr_images.txt  monitor-images.txt
          cp /tmp/curr_chunks.txt  monitor-chunks.txt
          cp /tmp/curr_routes.txt  monitor-routes.txt
          cp /tmp/curr_text.txt    monitor-text.txt
          echo "$TURBOPACK_NEW"  > monitor-turbopack.txt
          echo "$NEW_ETAG"       > etag.txt

          # Append to scan-findings log
          {
            echo "=== $(date -u '+%Y-%m-%dT%H:%M:%SZ') ==="
            echo "ETag: $NEW_ETAG"
            echo "Type: $([ "$IS_CONTENT" = true ] && echo 'content' || echo 'backend')"
            [ -n "$NEW_IMAGES" ]   && echo "New images:     $NEW_IMAGES"
            [ -n "$REM_IMAGES" ]   && echo "Removed images: $REM_IMAGES"
            [ -n "$NEW_ROUTES" ]   && echo "New routes:     $NEW_ROUTES"
            [ -n "$TEXT_CHANGES" ] && echo "Text changes:   $TEXT_CHANGES"
            echo "JS chunks: ${NEW_COUNT} total, delta: ${CHUNK_DELTA} (+${ADDED_C}/-${REMOVED_C})"
            echo ""
          } >> scan-findings.txt

          # Pull first to avoid race condition if two runs overlap
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash origin main
          git add etag.txt monitor-images.txt monitor-chunks.txt monitor-routes.txt \
                  monitor-text.txt monitor-turbopack.txt scan-findings.txt
          git commit -m "ETag updated: $NEW_ETAG"
          git push

      - name: No change
        if: steps.fetch.outputs.etag == steps.stored.outputs.etag
        run: echo "No change - ETag unchanged."
