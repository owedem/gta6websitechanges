name: GTA VI Site Monitor

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch current ETag
        id: fetch
        run: |
          ETAG=$(curl -sIL https://www.rockstargames.com/VI/ | grep -i "^etag:" | tail -1 | tr -d '\r' | awk '{print $2}')
          echo "etag=$ETAG" >> $GITHUB_OUTPUT
          echo "Current ETag: $ETAG"

      - name: Read stored ETag
        id: stored
        run: |
          STORED=$(cat etag.txt 2>/dev/null || echo "")
          echo "etag=$STORED" >> $GITHUB_OUTPUT
          echo "Stored ETag: $STORED"

      - name: Diff and notify
        if: steps.fetch.outputs.etag != steps.stored.outputs.etag && steps.fetch.outputs.etag != ''
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          NEW_ETAG: ${{ steps.fetch.outputs.etag }}
        run: |
          curl -sL https://www.rockstargames.com/VI/ > /tmp/page.html
          BASE="https://www.rockstargames.com/VI/_next/static/media/"

          # Get current images/routes
          grep -oP '/_next/static/media/\K[^"?]+\.(jpg|png)' /tmp/page.html | sort -u > /tmp/curr_images.txt
          grep -oP 'href="/VI/\K[^"]+' /tmp/page.html | grep -v "_next" | sort -u > /tmp/curr_routes.txt

          # Compare with previous
          NEW_IMAGES=$(diff monitor-images.txt /tmp/curr_images.txt 2>/dev/null | grep '^>' | sed 's/^> //') || true
          NEW_ROUTES=$(diff monitor-routes.txt /tmp/curr_routes.txt 2>/dev/null | grep '^>' | sed 's/^> //') || true

          TIME=$(date -u '%d %b %Y at %H:%M UTC')

          # Build embed fields - only show new items
          if [ -n "$NEW_IMAGES" ]; then
            IMAGES_STR=$(echo "$NEW_IMAGES" | awk -v b="$BASE" '{print "• [" $0 "](" b $0 ")"}' | head -20)
          else
            IMAGES_STR="None"
          fi

          if [ -n "$NEW_ROUTES" ]; then
            ROUTES_STR=$(echo "$NEW_ROUTES" | awk '{print "• " $0}')
          else
            ROUTES_STR="None"
          fi

          PAYLOAD=$(jq -n \
            --arg time "$TIME" \
            --arg images "$IMAGES_STR" \
            --arg routes "$ROUTES_STR" \
            '{content: "@everyone", embeds: [{title: "GTA VI Site Updated", url: "https://www.rockstargames.com/VI/", color: 16711680, fields: [{name: "Detected at", value: $time, inline: false}, {name: "New Images", value: ($images | .[0:1020]), inline: false}, {name: "New Page Routes", value: $routes, inline: false}], footer: {text: "GTA VI Monitor"}}], allowed_mentions: {parse: ["everyone"]}}')
          curl -s -H "Content-Type: application/json" -d "$PAYLOAD" "$DISCORD_WEBHOOK"

          # Save current state
          cp /tmp/curr_images.txt monitor-images.txt
          cp /tmp/curr_routes.txt monitor-routes.txt
          echo "$NEW_ETAG" > etag.txt
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add etag.txt monitor-images.txt monitor-routes.txt
          git commit -m "ETag updated: $NEW_ETAG"
          git push

      - name: No change
        if: steps.fetch.outputs.etag == steps.stored.outputs.etag
        run: echo "No change. ETag unchanged."
