name: GTA VI Site Monitor

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch current ETag
        id: fetch
        run: |
          ETAG=$(curl -sIL https://www.rockstargames.com/VI/ | grep -i "^etag:" | tail -1 | tr -d '\r' | awk '{print $2}')
          echo "etag=$ETAG" >> $GITHUB_OUTPUT
          echo "Current ETag: $ETAG"

      - name: Read stored ETag
        id: stored
        run: |
          STORED=$(cat etag.txt 2>/dev/null || echo "")
          echo "etag=$STORED" >> $GITHUB_OUTPUT
          echo "Stored ETag: $STORED"

      - name: Diff and notify
        if: steps.fetch.outputs.etag != steps.stored.outputs.etag && steps.fetch.outputs.etag != ''
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          NEW_ETAG: ${{ steps.fetch.outputs.etag }}
        run: |
          curl -sL https://www.rockstargames.com/VI/ > /tmp/page.html
          NEW_MEDIA=$(grep -oP '/_next/static/media/\K[^"?]+\.(jpg|png|mp4|webm)' /tmp/page.html | sort -u | head -10)
          MEDIA_COUNT=$(echo "$NEW_MEDIA" | grep -c '.')
          MEDIA_LIST=$(echo "$NEW_MEDIA" | head -5 | sed 's/^/• /' | tr '\n' '\n')
          NEW_PAGES=$(grep -oP 'href="/VI/\K[^"]+' /tmp/page.html | grep -v "_next" | sort -u)
          TIME=$(date -u '+%d %b %Y at %H:%M UTC')
          cat > /tmp/build_payload.py << 'PYEOF'
import json, os, sys
time = os.environ.get("TIME", "")
media = os.environ.get("NEW_MEDIA", "").strip()
media_count = os.environ.get("MEDIA_COUNT", "0").strip()
pages = os.environ.get("NEW_PAGES", "").strip()
media_lines = ["• " + m for m in media.splitlines() if m][:5]
media_str = "\n".join(media_lines) if media_lines else "No new media detected"
if len(media.splitlines()) > 5:
    media_str += f"\n... and {int(media_count)-5} more"
pages_list = ["• " + p for p in pages.splitlines() if p]
pages_str = "\n".join(pages_list) if pages_list else "No new pages detected"
embed = {
    "title": "GTA VI Site Updated",
    "url": "https://www.rockstargames.com/VI/",
    "color": 16711680,
    "fields": [
        {"name": "Detected at", "value": time, "inline": False},
        {"name": "Media files on page", "value": media_str, "inline": False},
        {"name": "Page routes", "value": pages_str, "inline": False}
    ],
    "footer": {"text": "GTA VI Monitor"}
}
payload = {"content": "@everyone", "embeds": [embed], "allowed_mentions": {"parse": ["everyone"]}}
print(json.dumps(payload))
PYEOF
          export TIME NEW_MEDIA MEDIA_COUNT NEW_PAGES
          python3 /tmp/build_payload.py > /tmp/payload.json
          curl -s -H "Content-Type: application/json" -d @/tmp/payload.json "$DISCORD_WEBHOOK"
          echo "$NEW_ETAG" > etag.txt
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add etag.txt
          git commit -m "ETag updated: $NEW_ETAG"
          git push

      - name: No change
        if: steps.fetch.outputs.etag == steps.stored.outputs.etag
        run: echo "No change. ETag unchanged."
