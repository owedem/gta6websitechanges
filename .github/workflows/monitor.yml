name: GTA VI Site Monitor

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch current ETag
        id: fetch
        run: |
          ETAG=$(curl -sIL https://www.rockstargames.com/VI/ | grep -i "^etag:" | tail -1 | tr -d '\r' | awk '{print $2}')
          echo "etag=$ETAG" >> $GITHUB_OUTPUT
          echo "Current ETag: $ETAG"

      - name: Read stored ETag
        id: stored
        run: |
          STORED=$(cat etag.txt 2>/dev/null || echo "")
          echo "etag=$STORED" >> $GITHUB_OUTPUT
          echo "Stored ETag: $STORED"

      - name: Diff and notify
        if: steps.fetch.outputs.etag != steps.stored.outputs.etag && steps.fetch.outputs.etag != ''
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          curl -sL https://www.rockstargames.com/VI/ > /tmp/page.html
          NEW_MEDIA=$(grep -oP '/_next/static/media/\K[^"?]+\.(jpg|png|mp4|webm)' /tmp/page.html | sort -u | head -20 | tr '\n' ' ')
          NEW_ROUTES=$(grep -oP 'href="/VI/\K[^"]+' /tmp/page.html | sort -u | tr '\n' ' ')
          TIME=$(date -u '+%Y-%m-%d %H:%M UTC')

          python3 -c "
import json, sys
msg = '@everyone **GTA VI site just updated!**\nDetected at: $TIME\nMedia: ${NEW_MEDIA:-none}\nRoutes: ${NEW_ROUTES:-none}\nhttps://www.rockstargames.com/VI/'
with open('/tmp/payload.json', 'w') as f:
    json.dump({'content': msg}, f)
"
          curl -v -H "Content-Type: application/json" -d @/tmp/payload.json "$DISCORD_WEBHOOK"

          echo "${{ steps.fetch.outputs.etag }}" > etag.txt
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add etag.txt
          git commit -m "ETag updated: ${{ steps.fetch.outputs.etag }}"
          git push

      - name: No change
        if: steps.fetch.outputs.etag == steps.stored.outputs.etag
        run: echo "No change. ETag unchanged."
